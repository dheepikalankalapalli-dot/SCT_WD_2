<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch Web Application</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

#display{
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.start{background:#28a745;color:white;}
.pause{background:#ffc107;color:black;}
.reset{background:#dc3545;color:white;}
.lap{background:#007bff;color:white;}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
    max-height:200px;
    overflow-y:auto;
}

li{
    padding:5px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="container">
    <h1>Stopwatch</h1>

    <div id="display">00:00:00</div>

    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
    <button class="lap" onclick="recordLap()">Lap</button>

    <ul id="laps"></ul>
</div>

<script>
let seconds = 0;
let minutes = 0;
let hours = 0;
let timer = null;

function updateDisplay(){
    let h = String(hours).padStart(2,'0');
    let m = String(minutes).padStart(2,'0');
    let s = String(seconds).padStart(2,'0');

    document.getElementById("display").innerText =
    `${h}:${m}:${s}`;
}

function startTimer(){
    if(timer !== null) return;

    timer = setInterval(() => {
        seconds++;

        if(seconds === 60){
            seconds = 0;
            minutes++;
        }

        if(minutes === 60){
            minutes = 0;
            hours++;
        }

        updateDisplay();
    },1000);
}

function pauseTimer(){
    clearInterval(timer);
    timer = null;
}

function resetTimer(){
    clearInterval(timer);
    timer = null;

    seconds = 0;
    minutes = 0;
    hours = 0;

    updateDisplay();
    document.getElementById("laps").innerHTML = "";
}

function recordLap(){
    let lapTime =
    document.getElementById("display").innerText;

    let li = document.createElement("li");
    li.innerText = "Lap: " + lapTime;

    document.getElementById("laps").appendChild(li);
}

updateDisplay();
</script>

</body>
</html>
